{% extends "base.html" %}
{% block content %}
<h2>用户注册</h2>
<form method="post">
    <input type="text" name="username" placeholder="用户名" required>
    <input type="password" name="password" placeholder="密码（至少 6 位）" required minlength="6">
    <input type="password" name="confirm" placeholder="确认密码" required minlength="6">
    <button type="submit">注册</button>
</form>
<p>已有账号？<a href="{{ url_for('auth.login') }}">去登录</a></p>
{% endblock %}
